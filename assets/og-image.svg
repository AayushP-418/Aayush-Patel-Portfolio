<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="logo-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="line-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080d1a"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="1100" cy="-40" rx="500" ry="340" fill="rgba(129,140,248,0.12)"/>
  <ellipse cx="-80" cy="250" rx="380" ry="280" fill="rgba(34,211,238,0.08)"/>

  <!-- Logo box -->
  <rect x="80" y="200" width="72" height="72" rx="18" fill="url(#logo-g)"/>
  <text x="116" y="247" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="700" fill="white" letter-spacing="1">AP</text>

  <!-- Name -->
  <text x="80" y="336"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="62" font-weight="700" fill="#e8ecf7">Aayush Patel</text>

  <!-- Title -->
  <text x="80" y="390"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="26" fill="#7b8db0">Applied AI Engineer · Georgia Tech CS '28 · GPA 3.71</text>

  <!-- Accent line -->
  <rect x="80" y="414" width="140" height="3" rx="1.5" fill="url(#line-g)"/>

  <!-- Tags -->
  <text x="80" y="464"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="22" fill="#a5b4fc">RAG Systems · Evolutionary AutoML · LLM Integration · ML at Scale</text>
</svg>
